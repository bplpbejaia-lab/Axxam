<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <meta name="description" content="Gestion des catégories - Axxam">

    <script src="js/auth.js"></script>
    <script>authService.checkAuth('admin');</script>
    <style>
        /* Full-page modal styles */
        .modal-overlay.full-page {
            background: var(--bg-main) !important;
            padding: 0 !important;
            align-items: flex-start !important;
            overflow-y: auto !important;
        }

        .modal-overlay.full-page .modal-content {
            width: 100% !important;
            max-width: none !important;
            height: 100% !important;
            min-height: 100vh !important;
            border-radius: 0 !important;
            box-shadow: none !important;
            display: flex;
            flex-direction: column;
            margin: 0 !important;
            overflow: hidden !important;
        }

        .modal-overlay.full-page .modal-header {
            position: sticky;
            top: 0;
            z-index: 100;
            background: white;
            border-bottom: 2px solid var(--border);
            padding: 15px 20px;
        }

        .modal-overlay.full-page .modal-body,
        .modal-overlay.full-page form {
            flex: 1;
            padding: 20px 30px;
            padding-bottom: 250px !important;
            overflow-y: auto;
        }

        .modal-overlay.full-page .modal-footer {
            position: sticky;
            bottom: 0;
            left: 0;
            right: 0;
            background: white;
            border-top: 2px solid var(--border);
            padding: 15px 20px;
            display: flex;
            justify-content: flex-end;
            gap: 12px;
            z-index: 101;
            margin-top: auto;
            box-shadow: 0 -5px 15px rgba(0,0,0,0.05);
        }

        /* Adjustments for inputs in full page to be large and clear */
        .modal-overlay.full-page .input {
            font-size: 1.1rem !important;
            padding: 14px 18px !important;
        }

        .modal-overlay.full-page label {
            font-size: 0.95rem !important;
            font-weight: 700 !important;
            margin-bottom: 10px !important;
        }

        /* Ensure form content is scrollable above the keyboard */
        body.keyboard-active .modal-overlay.full-page .modal-body,
        body.keyboard-active .modal-overlay.full-page form {
            padding-bottom: 300px !important;
        }
    </style>
</head>

<body>

                            <line x1="8" y1="3" x2="8" y2="21" />
                            <line x1="16" y1="3" x2="16" y2="21" />

                    <span>Ventes</span>

                <a href="withdrawals.html" class="navbar-link" title="Caisse" aria-label="Caisse">

                    <span>Caisse</span>
                </a>
                <a href="inventory.html" class="navbar-link" title="Stock" aria-label="Stock">
                    <svg class="navbar-icon" viewBox="0 0 24 24" fill="none" stroke-linecap="round" stroke-linejoin="round"><path d="m7.5 4.27 9 5.15"/><path d="M21 8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16Z"/><path d="m3.3 7 8.7 5 8.7-5"/><path d="M12 22V12"/></svg>

                    <span>Achats</span>
                </a>
                <a href="commandes.html" class="navbar-link" title="Commandes" aria-label="Commandes">

                    <span>Commandes</span>

                    <svg class="navbar-icon" viewBox="0 0 24 24" fill="none" stroke-linecap="round" stroke-linejoin="round"><polyline points="22 7 13.5 15.5 8.5 10.5 2 17"/><polyline points="16 7 22 7 22 13"/></svg>
                    <span>Stats</span>
                </a>

                    <span>Categories</span>
                </a>
                <a href="settings.html" class="navbar-link" title="Parametres" aria-label="Parametres">

                            <path d="m21 21-4.3-4.3" />
                        </svg>
                    </span>

            </div>

        <!-- Main Content -->
        <div class="main-area" id="mainAreaCategories" style="overflow-y: auto; position: relative;">
            <!-- Scroll Buttons for Categories -->
            <div class="scroll-nav-container" style="bottom: 30px; right: 30px; position: fixed;">
                <button class="scroll-nav-btn"
                    onclick="document.getElementById('mainAreaCategories').scrollBy({top: -400, behavior: 'smooth'})"
                    title="Vers le haut">
                    <svg viewBox="0 0 24 24">
                        <path d="M18 15l-6-6-6 6" />
                    </svg>
                </button>
                <button class="scroll-nav-btn"
                    onclick="document.getElementById('mainAreaCategories').scrollBy({top: 400, behavior: 'smooth'})"
                    title="Vers le bas">

                        <path d="M6 9l6 6 6-6" />
                    </svg>

            </div>
            <main class="products-section" style="padding: var(--space-xl);">
                <div class="categories-grid" id="categoriesGrid"></div>
            </main>
        </div>
    </div>

    <!-- Category Modal (Full Page) -->
    <div id="categoryModal" class="modal-overlay full-page">
        <div class="modal-content">
            <div class="modal-header">
                <h3>📁 Nouvelle Catégorie</h3>
                <button class="modal-close" id="closeCategoryModal">✕</button>
            </div>
            <form id="categoryForm">
                <div class="form-group">
                    <label>Nom de la catégorie</label>
                    <input type="text" class="input" id="categoryName" required placeholder="Ex: Boissons">
                </div>
                <div class="form-group">
                    <label>Image de la catégorie</label>
                    <div class="image-upload-area mb-md" id="categoryImageUploadArea"
                        onclick="document.getElementById('categoryImageFile').click()">
                        <input type="file" id="categoryImageFile" accept="image/*">
                        <div id="categoryImagePreviewContainer">
                            <span class="upload-icon">📷</span>
                            <p class="text-sm text-muted">Cliquez pour ajouter une image</p>
                        </div>
                    </div>
                    <input type="hidden" id="categoryImage">
                </div>
                <div class="form-group">
                    <label>Couleur</label>
                    <input type="color" class="input" id="categoryColor" value="#8B4513" style="height: 50px;">
                </div>
            </form>
            <div class="modal-footer">
                <button type="button" class="btn btn-outline" id="cancelCategoryModal">Annuler</button>
                <button type="submit" class="btn btn-primary" form="categoryForm">✓ Créer</button>
            </div>
        </div>
    </div>

    <!-- Toast Container -->
    <div class="toast-container" id="toastContainer"></div>

    <script src="js/app.js"></script>
    <script src="js/virtual-keyboard.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function () {
            initCategoriesPage();
            
            // File upload handler for category image
            setupFileUpload('categoryImageFile', 'categoryImageUploadArea', 'categoryImagePreviewContainer', 'categoryImage');
        });
        
        function setupFileUpload(inputId, areaId, previewId, valueId) {
            const input = document.getElementById(inputId);
            if (!input) return;

            input.addEventListener('change', function (e) {
                const file = e.target.files[0];
                if (file) {
                    const reader = new FileReader();
                    reader.onload = function (e) {
                        document.getElementById(areaId).classList.add('has-image');
                        document.getElementById(previewId).innerHTML = `<img src="${e.target.result}" alt="Preview" style="max-width: 100%; max-height: 200px; object-fit: cover; border-radius: 8px;">`;
                        document.getElementById(valueId).value = e.target.result;
                    };
                    reader.readAsDataURL(file);
                }
            });
        }
    </script>
</body>

</html>
