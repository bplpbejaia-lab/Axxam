<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Commandes - Axxam</title>
    <meta name="description" content="Traitement des commandes clients - Axxam">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/extra.css">
    <script src="js/auth.js"></script>
    <script>authService.checkAuth('admin');</script>
</head>

<body>
    <div class="app-layout">
        <header class="top-navbar">
            <div class="navbar-brand">
                <div class="navbar-logo-wrapper">
                    <div class="navbar-logo">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                            stroke-linecap="round" stroke-linejoin="round">
                            <rect x="2" y="3" width="20" height="18" rx="3" />
                            <line x1="8" y1="3" x2="8" y2="21" />
                            <line x1="16" y1="3" x2="16" y2="21" />
                            <line x1="2" y1="9" x2="22" y2="9" />
                            <line x1="2" y1="15" x2="22" y2="15" />
                        </svg>
                    </div>
                </div>
                <h1 class="navbar-title">Axxam</h1>
            </div>

            <nav class="navbar-nav">
                <a href="index.html" class="navbar-link" title="Ventes" aria-label="Ventes">
                    <svg class="navbar-icon" viewBox="0 0 24 24" fill="none" stroke-linecap="round" stroke-linejoin="round"><circle cx="8" cy="21" r="1"/><circle cx="19" cy="21" r="1"/><path d="M2.05 2.05h2l2.66 12.42a2 2 0 0 0 2 1.58h9.78a2 2 0 0 0 1.95-1.57l1.65-7.43H5.12"/></svg>
                    <span>Ventes</span>
                </a>
                <a href="withdrawals.html" class="navbar-link" title="Caisse" aria-label="Caisse">
                    <svg class="navbar-icon" viewBox="0 0 24 24" fill="none" stroke-linecap="round" stroke-linejoin="round"><rect width="20" height="12" x="2" y="6" rx="2"/><circle cx="12" cy="12" r="2"/><path d="M6 12h.01M18 12h.01"/></svg>
                    <span>Caisse</span>
                </a>
                <a href="inventory.html" class="navbar-link" title="Stock" aria-label="Stock">
                    <svg class="navbar-icon" viewBox="0 0 24 24" fill="none" stroke-linecap="round" stroke-linejoin="round"><path d="m7.5 4.27 9 5.15"/><path d="M21 8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16Z"/><path d="m3.3 7 8.7 5 8.7-5"/><path d="M12 22V12"/></svg>
                    <span>Stock</span>
                </a>
                <a href="achats.html" class="navbar-link" title="Achats" aria-label="Achats">
                    <svg class="navbar-icon" viewBox="0 0 24 24" fill="none" stroke-linecap="round" stroke-linejoin="round"><path d="M6 2L3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 0 1-8 0"/></svg>
                    <span>Achats</span>
                </a>
                <a href="commandes.html" class="navbar-link active" title="Commandes" aria-label="Commandes">
                    <svg class="navbar-icon" viewBox="0 0 24 24" fill="none" stroke-linecap="round" stroke-linejoin="round"><path d="M9 11h6"/><path d="M9 15h6"/><path d="M8 3h8l2 3v15H6V6z"/><path d="M8 3v3h10"/></svg>
                    <span>Commandes</span>
                </a>
                <a href="stats.html" class="navbar-link" title="Stats" aria-label="Stats">
                    <svg class="navbar-icon" viewBox="0 0 24 24" fill="none" stroke-linecap="round" stroke-linejoin="round"><polyline points="22 7 13.5 15.5 8.5 10.5 2 17"/><polyline points="16 7 22 7 22 13"/></svg>
                    <span>Stats</span>
                </a>
                <a href="categories.html" class="navbar-link" title="Categories" aria-label="Categories">
                    <svg class="navbar-icon" viewBox="0 0 24 24" fill="none" stroke-linecap="round" stroke-linejoin="round"><path d="m15 5 6.3 6.3a2.8 2.8 0 0 1 0 4L15 21"/><path d="m7 5 6.3 6.3a2.8 2.8 0 0 1 0 4L7 21"/><path d="M2 13.5V5a3 3 0 0 1 3-3h8.5"/><circle cx="7" cy="7" r="1"/></svg>
                    <span>Categories</span>
                </a>
                <a href="settings.html" class="navbar-link" title="Parametres" aria-label="Parametres">
                    <svg class="navbar-icon" viewBox="0 0 24 24" fill="none" stroke-linecap="round" stroke-linejoin="round"><path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.1a2 2 0 0 1-1-1.72v-.51a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"/><circle cx="12" cy="12" r="3"/></svg>
                    <span>Parametres</span>
                </a>
            </nav>

            <div class="navbar-actions">
                <a class="btn btn-outline" href="/client/" target="_blank">App client</a>
            </div>
        </header>

        <div class="main-area page-main">
            <main class="page-surface commandes-page">
                <section class="commandes-hero">
                    <div>
                        <p class="page-eyebrow">Commandes clients</p>
                        <h2>Suivi et traitement</h2>
                        <p>Les commandes passees depuis la sous-app client arrivent ici en temps reel.</p>
                    </div>
                    <a class="btn btn-primary" href="/client/" target="_blank">Ouvrir la sous-app client</a>
                </section>

                <section class="customer-orders-stats">
                    <div class="customer-orders-stat">
                        <span>Total</span>
                        <strong id="customerOrdersStat-all">0</strong>
                    </div>
                    <div class="customer-orders-stat">
                        <span>Nouvelles</span>
                        <strong id="customerOrdersStat-nouvelle">0</strong>
                    </div>
                    <div class="customer-orders-stat">
                        <span>Preparation</span>
                        <strong id="customerOrdersStat-preparation">0</strong>
                    </div>
                    <div class="customer-orders-stat">
                        <span>Pretes</span>
                        <strong id="customerOrdersStat-prete">0</strong>
                    </div>
                    <div class="customer-orders-stat">
                        <span>Livrees</span>
                        <strong id="customerOrdersStat-livree">0</strong>
                    </div>
                </section>

                <section class="customer-orders-toolbar">
                    <div class="search-box customer-order-search">
                        <span class="search-icon">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                                <circle cx="11" cy="11" r="8" />
                                <path d="m21 21-4.3-4.3" />
                            </svg>
                        </span>
                        <input type="text" placeholder="Client, telephone, produit..." id="customerOrderSearch">
                    </div>

                    <select class="input customer-order-filter" id="customerOrderStatusFilter">
                        <option value="all">Tous les statuts</option>
                        <option value="nouvelle">Nouvelles</option>
                        <option value="confirmee">Confirmees</option>
                        <option value="preparation">En preparation</option>
                        <option value="prete">Pretes</option>
                        <option value="livree">Livrees</option>
                        <option value="annulee">Annulees</option>
                    </select>
                </section>

                <section class="customer-orders-list" id="customerOrdersList"></section>
            </main>
        </div>
    </div>

    <div class="toast-container" id="toastContainer"></div>
    <script src="js/app.js"></script>
    <script src="js/virtual-keyboard.js"></script>
    <script src="js/branding.js"></script>
</body>

</html>
