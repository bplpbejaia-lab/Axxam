<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Accès Refusé - Axxam</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #4A2C2A;
            --primary-light: #7B5B52;
            --secondary: #8B4513;
            --accent: #D4A843;
            --danger: #DC3545;
            --dark: #2C1810;
            --surface: #FFFFFF;
            --bg-main: #FBF8F5;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, var(--bg-main) 0%, #EDE8E4 100%);
            position: relative;
            overflow: hidden;
        }

        /* Background Pattern */
        body::before {
            content: '';
            position: absolute;
            inset: 0;
            background-image: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%238B4513' fill-opacity='0.03'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
            z-index: 0;
        }

        .container {
            position: relative;
            z-index: 1;
            text-align: center;
            padding: 60px 40px;
            background: var(--surface);
            border-radius: 32px;
            box-shadow: 0 25px 60px rgba(139, 69, 19, 0.15);
            max-width: 500px;
            width: 90%;
            animation: slideUp 0.6s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(40px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .icon-container {
            width: 120px;
            height: 120px;
            margin: 0 auto 30px;
            background: linear-gradient(135deg, #FFF5F5 0%, #FFEBEB 100%);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            animation: pulse 2s ease-in-out infinite;
        }

        @keyframes pulse {

            0%,
            100% {
                transform: scale(1);
            }

            50% {
                transform: scale(1.05);
            }
        }

        .icon-container::before {
            content: '';
            position: absolute;
            inset: -8px;
            border-radius: 50%;
            border: 3px dashed var(--danger);
            opacity: 0.3;
            animation: rotate 20s linear infinite;
        }

        @keyframes rotate {
            from {
                transform: rotate(0deg);
            }

            to {
                transform: rotate(360deg);
            }
        }

        .lock-icon {
            font-size: 56px;
        }

        h1 {
            font-size: 2rem;
            font-weight: 800;
            color: var(--dark);
            margin-bottom: 12px;
        }

        .subtitle {
            font-size: 1.1rem;
            color: #6B5B54;
            margin-bottom: 30px;
            line-height: 1.6;
        }

        .page-name {
            display: inline-block;
            background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
            color: white;
            padding: 6px 16px;
            border-radius: 20px;
            font-weight: 600;
            font-size: 0.9rem;
            margin-bottom: 30px;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            padding: 16px 32px;
            font-size: 1rem;
            font-weight: 700;
            border: none;
            border-radius: 16px;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
            text-decoration: none;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
            color: white;
            box-shadow: 0 8px 25px rgba(139, 69, 19, 0.3);
        }

        .btn-primary:hover {
            transform: translateY(-3px);
            box-shadow: 0 12px 35px rgba(139, 69, 19, 0.4);
        }

        .btn-secondary {
            background: var(--bg-main);
            color: var(--primary);
            margin-left: 12px;
        }

        .btn-secondary:hover {
            background: #EDE8E4;
        }

        .actions {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 12px;
        }

        .coffee-beans {
            position: absolute;
            font-size: 40px;
            opacity: 0.1;
            animation: float 6s ease-in-out infinite;
        }

        .coffee-beans:nth-child(1) {
            top: 10%;
            left: 10%;
            animation-delay: 0s;
        }

        .coffee-beans:nth-child(2) {
            top: 20%;
            right: 15%;
            animation-delay: 1s;
        }

        .coffee-beans:nth-child(3) {
            bottom: 15%;
            left: 20%;
            animation-delay: 2s;
        }

        .coffee-beans:nth-child(4) {
            bottom: 25%;
            right: 10%;
            animation-delay: 3s;
        }

        @keyframes float {

            0%,
            100% {
                transform: translateY(0) rotate(0deg);
            }

            50% {
                transform: translateY(-20px) rotate(10deg);
            }
        }

        .user-info {
            margin-top: 30px;
            padding-top: 20px;
            border-top: 1px solid #EDE8E4;
            font-size: 0.85rem;
            color: #8B7B74;
        }

        .user-info strong {
            color: var(--primary);
        }

        @media (max-width: 500px) {
            .container {
                padding: 40px 25px;
            }

            h1 {
                font-size: 1.6rem;
            }

            .actions {
                flex-direction: column;
            }

            .btn-secondary {
                margin-left: 0;
            }
        }

        .logout-action {
            margin-top: 20px;
        }

        .btn-logout {
            background: transparent;
            color: var(--danger);
            border: 2px solid var(--danger);
            width: 100%;
            justify-content: center;
        }

        .btn-logout:hover {
            background: var(--danger);
            color: white;
        }
    </style>
</head>

<body>
    <!-- Floating Coffee Beans -->

            <path d="M16 8a1 1 0 0 1 1 1v8a4 4 0 0 1-4 4H7a4 4 0 0 1-4-4V9a1 1 0 0 1 1-1h12Z" />
            <path d="M17 12h2a2 2 0 0 1 2 2v1a2 2 0 0 1-2 2h-2" />
            <path d="M7 2v2" />
        </svg></div>

            <path d="M17 12h2a2 2 0 0 1 2 2v1a2 2 0 0 1-2 2h-2" />

            stroke-linejoin="round">
            <path d="M10 2v2" />

            <path d="M16 8a1 1 0 0 1 1 1v8a4 4 0 0 1-4 4H7a4 4 0 0 1-4-4V9a1 1 0 0 1 1-1h12Z" />
            <path d="M17 12h2a2 2 0 0 1 2 2v1a2 2 0 0 1-2 2h-2" />

        </svg></div>

    <div class="container">
        <div class="icon-container">
            <svg class="lock-icon" width="56" height="56" viewBox="0 0 24 24" fill="none" stroke="var(--danger)"
                stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <rect width="18" height="11" x="3" y="11" rx="2" ry="2" />
                <path d="M7 11V7a5 5 0 0 1 10 0v4" />
            </svg>
        </div>

        <h1>Accès Refusé</h1>
        <p class="subtitle">
            Désolé, vous n'avez pas les permissions nécessaires pour accéder à cette section.
        </p>

        <div class="page-name" id="pageName">Page restreinte</div>

        <div class="actions">
            <a href="index.html" class="btn btn-primary">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round">
                    <path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z" />
                    <polyline points="9 22 9 12 15 12 15 22" />
                </svg>
                Retour à l'accueil
            </a>
            <button onclick="history.back()" class="btn btn-secondary">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round">
                    <path d="M9 14 4 9l5-5" />
                    <path d="M20 20v-7a4 4 0 0 0-4-4H4" />
                </svg>
                Page précédente
            </button>
        </div>

        <div class="logout-action">
            <button onclick="logout()" class="btn btn-logout">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round">
                    <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4" />
                    <polyline points="16 17 21 12 16 7" />
                    <line x1="21" x2="9" y1="12" y2="12" />
                </svg>
                Se Déconnecter
            </button>
        </div>

        <div class="user-info" id="userInfo">
            Connecté en tant que <strong>...</strong>
        </div>
    </div>

    <script>
        // Get the page name from URL params
        const params = new URLSearchParams(window.location.search);
        const page = params.get('page');
        if (page) {
            document.getElementById('pageName').textContent = page;
        }

        // Show current user
        const userStr = localStorage.getItem('cafe_current_user');
        if (userStr) {
            const user = JSON.parse(userStr);
            document.getElementById('userInfo').innerHTML =
                `Connecté en tant que <strong>${user.name || user.username}</strong> (${user.role === 'admin' ? 'Administrateur' : 'Utilisateur'})`;
        }

        // Logout function
        function logout() {
            localStorage.removeItem('cafe_current_user');
            window.location.href = 'login.html';
        }
    </script>
</body>

</html>
